schemaVersion: "0.3"
description: "Scale ECS service to a desired task count"
parameters:
  ClusterName:
    type: String
    description: "Name of the ECS Cluster"
  ServiceName:
    type: String
    description: "Name of the ECS Service"
  DesiredCount:
    type: String
    default: "1"
    description: "Desired number of tasks"
  Region:
    type: String
    description: "AWS Region"

mainSteps:
  - name: UpdateDesiredCount
    action: "aws:executeAwsApi"
    inputs:
      Service: ecs
      Api: UpdateService
      cluster: "{{ ClusterName }}"
      service: "{{ ServiceName }}"
      desiredCount: "{{ DesiredCount }}"
      region: "{{ Region }}"
    outputs:
      - Name: ServiceArn
        Selector: "$.service.serviceArn"
        Type: String

  - name: WaitForStable
    action: "aws:waitForAwsResourceProperty"
    inputs:
      Service: ecs
      Api: DescribeServices
      cluster: "{{ ClusterName }}"
      services:
        - "{{ ServiceName }}"
      region: "{{ Region }}"
      PropertySelector: "$.services[0].deployments[0].rolloutState"
      DesiredValues:
        - "COMPLETED"
    onFailure: Step
    timeoutSeconds: 300

outputs:
  - UpdateDesiredCount.ServiceArn
